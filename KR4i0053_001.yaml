body:
  text: 詩話補遺卷一明楊慎撰浮渲梳頭本事詩載劉禹錫杜司空席上贈妓詩云浮渲梳頭宫樣妝春風一曲杜韋娘今本浮渲梳頭作髙鬢雲鬟又以為韋應物詩者誤也蓋韋與劉皆嘗為蘇州刺史是以傳疑浮渲字妙畫家以墨飾美人鬢髮謂之渲染渲音眩險諢句吳均詩秋風瀧白水鴈足印黃沙為沈約所笑唐人以此類為險諢句傳竒詩多有之沈青箱夜月琉璃水春風卵色天是也韓退之水作青羅帶山如碧玉篸杜牧詩錢塘鸚鵡緑吳岫鷓鴣斑東坡詩山為翠浪涌水作玉虹流大家亦時有之也洞宫列仙傳燕昭王得洞光之珠以飾宫王母三降其地名曰洞宫劉滄有宿洞宫詩沐髮清齊宿洞宫又唐人稱道院曰洞宫楊巨源詩洞宫曽向龍邉宿雲徑應從鳥外還燭剪詩元武伯英詠燭剪詩啼殘瘦玉蘭心吐蹴落春紅燕尾香為一時所賞國朝古廉李公時勉詠剪刀詩吳綾剪處魚吞浪蜀錦裁時燕掠霞深院響傳春晝靜小樓工罷夕陽斜公之直節清聲而詩嫵媚如此信乎賦梅花者不獨宋廣平也雯華金國仙人王豫可詩詞多用雯華字見中州集元好問詩剝裂雯華漬月秋又寶宫寺聯云七重寶樹圍金界十色雯華擁畫梁查雯雲文也又石文似雲亦曰雯華古三墳書日雲赤曇月雲素雯劉因登寺閣詩雯華寶樹忽當眼摯虞論詩賦四過假象太過則與類相逺命辭過壯則與事相違辨言過理則與義相失麗靡過美則與情相悖黃雲春秋運斗樞曰黃雲四合女訛驚邦感精符曰妻黨翔則黃雲入國妻黨翔謂女謁盛也淮南子曰黃天之氣上為黃雲下為黃埃江淹詩河洲多沙塵風吹黃雲起李太白詩黃雲城南烏欲棲補文選注之未偹樂些城唐書驃國之地南盡􅀈海即今滇海北通南詔樂些城東北距陽苴咩城六千八百樂些即杜詩所謂和親邏洋城是也今作摩些其字雖異地一也音一也無名氏六言詩或云李季章作蔣凝賦止四韵邠老詩無全章丫頭花鈿滿面不及徐妃半籹塞北江南杜氏通典論凉州云地勢之險可以自保於一隅財富之殷可以無求於中國故五凉相繼與十六國立中州人士避難者多往依之蓋其風土之可樂如此唐韋蟾詩曰賀蘭山下果園成塞北江南舊有名稱其為塞北之江南以此漢古詩逸句庭中有竒樹上有悲鳴蟬泛泛江漢萍飄蕩永無根青青陵中草傾葉晞朝日陽春被惠澤枝葉可攬結餓狼食不多飢豹食有餘胡蝶逰西園暮宿桑樹間天霜朩葉下鴻鴈當南飛古詩四十餘首文選收其十九首今其遺句見於類書多有之聊録其一二斷圭缺璧猶勝瓦礫如山也人逺精魂近寤寐夢容光無名氏初秋北風至吹我章華臺浮雲多暮色似從崦嵫來同上石上生菖蒲一寸八九節仙人勸我餐令人好顔色同上羈縶繫世網進退維凖繩江偉去婦不顧門萎韭不入園諸葛孔明探懷授所歡願醉不顧身王仲宣皎月垂素光𤣥雲為髣佛劉公幹𤣥景如映璧繁星如散錦庾闡金荆持作枕紫荆持作床古歌爭先非吾事靜照在忘求王右軍來若迅風散逝如歸雲征李充翕如翔雲㑹忽若驚風散棗腆遙看野樹短逺望樵人細虞騫黃鳥鳴相追咬咬弄好音古詩相思心既勞相望脰亦悁陸彥聲迅飈翼華蓋飄颻若鴻飛石崇元清渺渺觀浴景出東渟仙詩逍遙元津際轡景落滄溟同上子書傳記語似詩者美色不同面悲音不共聲論衡片玉可以琦奚必待盈尺抱朴子兩江珥其市九橋帶其流楊雄生無一日歡死有萬世名列子善御不忘馬善射不忘弓韓詩外傳文繡被臺榭菽粟食鳬鴈晏子日日獻玉衣旦旦進玉食列子駿馬養外廄美人充下陳戰國策操行有常賢仕宦無常遇王充觸露不搯葵日中不剪韭古諺飛鳥號其羣鹿鳴求其友楚辭注膏以肥自􅌊翠以羽殃身蘇秦薰以香自燒膏以明自煎陳留父老良將如收電可見不可追抱朴子髙不絶山阜跛羊升其顛深不絶涓流孺子浴其淵牟子急行無善步促柱少和聲王充孔子辭廪丘終不盜帶鈎許由讓天下終不利封侯淮南髙山尋雲霓深谷肆無景羊祜疏南遊罔䆡野北息况墨鄉淮南日回而月周時不與人遊淮南百里不販樵千里不販糴古諺兩貴不可同兩勢不可雙說苑女愛不敝席男歡不盡輪鬼谷子御馬不釋策操弓不反檠家語鵲巢知風起獺穴知水生韓詩外傳豐屋知名家喬朩知舊都吕覽井水無大魚新林無長朩同上餓狼守庖厨飢虎牧牢豚仲長統昌言代馬依北風越鳥翔故巢吳越春秋荆土不貴玉鮫人不貴珠韓詩外傳蠧蝝仆柱梁蚊芒走牛羊新序青崖若㸃黛素湍如委練羅含湘中記白沙如霜雪赤岸若朝霞同上洞庭對嶽陽修眉鍳明鏡同上神邱有火穴光景照千里昆崘有弱水鴻毛不能起元中記日南有野女羣行不見夫其狀皛且白裸袒無衣襦唐䝉博物記蟪蛄鳴于朝寒螀鳴于夕風土記秋日蠅成市於朝蚊成市於夕同上夏日煦氣成虹霓揮袖起風塵劉邵趙都賦不寶咫尺玉而愛寸隂旬司馬法鼓聲不過閶柝聲不過閬同上鐸以聲自毁膏以明自鑠淮南大江如索帶舟船如鳬鴈郡國志跣跗被商舄重譯吟詩書王充醴泉有故源嘉禾有舊根同上白璧不可為容容多後福左雄傳仲尼長東魯大禹出西羌晋書戴叔鸞傳明月不妄映蘭葩豈虛鮮郭璞新霽青陽升天光入隙中佛經日從濛汜出照樹初無影同上隴坂縈九曲不知髙幾里三秦記髙樹翳朝雲文禽蔽緑水應璩平流鼓怒浪靜樹振驚飈尚書正義序榣朩不生危松柏不處卑國語遁䦧不可復亡犴不可再淮南一淵不兩蛟淮南兩雄不並棲三國志海魚空鳥大海從魚躍長空任鳥飛唐荆州陟屺寺僧元覽詩也朱文公嘗書之且跋之曰大丈夫處世不可無此氣象蓋亦取之元覽齊壁有張璪畫松符載讃之衛象詩之覽悉加堊焉曰無事疥吾壁也異哉此髠奴既能知魚鳥任其飛躍又何必介意於三才子之筆乎顛當顛當窩深如蚓穴網絲其中土蓋與地平大如榆莢仰捍其蓋伺蠅蠖過輒翻蓋捕之才入復閉與地一色並無絲障可尋也爾雅謂之王蛈蝪鬼谷子謂之蛈母秦中兒童戲曰顛當顛當牢守門蠮螉寇汝無處奔范成大六言詩曰恐妨胡蝶同夢笑倩顛當守門唐劉崇逺金華子云京師兒童以草臨此蟲穴呼之謂之釣駱駝須臾此蟲出穴有明經劉寡辭曰此即爾雅王蛈蝪也時人服其博識浙中謂之駝背蟲其形酷似駱駝也蛈母一作蛈鬼止觀之義杜詩白首重聞止觀經佛經云止能捨樂觀能離苦又云止能修心能斷貪愛觀能修慧能斷無明止如定而後能靜觀則慮而後能得也晚唐絶倡許渾蓮塘詩為憶蓮塘秉燭遊葉殘花敗尚維舟烟開翠扇清風曉水泛紅花白露秋神女暫來雲易散仙娥終去月難留空懷逺道難持贈醉倚西䦨盡日愁此為許丁卯集中第一詩而選者不之取也他如韋莊昔年曾向五陵逰一首羅隱梅花吳王醉處十餘里一首李郢上裴晋公四朝憂國鬢成絲一首皆晚唐之絶倡可與盛唐峥嶸惟具眼者知之紫濛慕容氏自云軒轅之後徙於紫濛之野晋書慕容氏贊曰紫濛徙構元塞分疆角端偃月步搖翻霜乘危蝟起怙險鴟張守以不德終致餘殃宋人送北使詩云風急紫濛催玉勒日長青瑣聽薰絃正用此事銅虹曉虹器物欵識有王氏銅虹燭錠虹與缸同如漢賦金缸銜壁唐詩銀缸斜背解明璫之類也李賀詩飛燕上簾鈎曉虹屏中碧亦謂貴人晏眠而曉燈猶在缸也瓠蘆河苜蓿烽岑參塞上詩苜蓿烽邉􅑮立春瓠蘆河上泪沾巾西域記云塞外無驛郵往往以烽代驛玉門關外有五烽苜蓿烽其一也又云瓠蘆河下廣上狹洄波甚急深不可渡上置玉門關即西境之咽喉也金人詠物詩中州集金羽士王豫可詠西瓜云一片冷沉渾底月半彎斜捲隴頭雲孫鐸詠玉簮花云披拂西風如有待徘徊凉月更多情鄭子𥅆詠酴醿詩云玉斧無人解羞月珠裙有意欲留仙皆極體物之工六朝七言律其體不純蝶黃花紫燕相追楊低柳合路塵飛已見垂鈎掛緑樹誠知淇水沾羅衣兩童夾車問不已五馬城南猶未歸鶯啼春欲駛無為空掩扉右梁簡文春情曲後二句又作五言也長安城中秋夜長佳人錦石搗流黃香杵紋砧知近逺傳聲遞響何凄凉七夕長河爛中秋明月光蠮螉塞邉絶候鴈鴛央樓上望天狼右後魏溫子升搗衣第五六句又作五言文窗玳瑁影嬋娟香帷翡翠出神仙促柱默唇鶯欲語調弦繫爪鴈相連秦聲本自楊家解吳歈那知謝傅憐祗愁芳夜促蘭膏無那煎右陳後主聽筝後二句五言舊知山裏絶氛埃登髙日暮心悠哉子平一去何時返仲叔長逰遂不來幽蘭獨夜清琴曲桂樹凌雲濁酒杯槁項同枯朩丹心等死灰右隋王無功北山後二句五言薰風啜茗杜子美何將軍山莊詩薰風啜茗時今本作春風非此詩十首皆一時作其曰千章夏朩清又曰紅綻雨肥梅皆夏景可證米元章米元章之書法人皆知之其詩律之妙人或不盡知也豫愛其望海樓一詩云雲間鐵瓮近青天縹渺飛樓百尺連三峽江聲流筆底六朝帆影落樽前幾畨畫角催殘日無事滄洲起白烟忽憶賞心何處是春風秋月兩茫然又詠潮云怒氣號聲迸海門州人傳是子胥魂天排雲陳千家吼地擁銀山萬馬奔勢與月輪齊朔望信如壺漏報朝昏吳王越霸成何事一唱漁歌過逺村又垂虹亭一絶云斷雲一葉洞庭帆玉破鱸魚霜破柑好作新詩寄桑苧垂虹秋色滿東南南浦詩寇凖南浦詩春風入垂楊烟波漲南浦落日動離魂江花泣微雨妙處不減唐人杜公引泉詩杜工部補稻畦水詩云芊芊炯翠羽剡剡生銀漢鷗鳥鏡裏來關山雪邉看秋菰成黑米精鑿傳白粲玉粒足晨炊紅鮮任霞散陸龜䝉引泉詩曽聞瑶池溜亦灌朱草田鳬伯弄翠蕊鸞雛舞丹煙淩風捩桂舵隔霧馳犀船二詩曲盡農田之景然而詞語且宕樂燕子詩穿花落水益沾巾范德機善本作帖水一笑正墜雙飛翼黃山谷云一笑俗作一箭非紛紛戲蝶過間幔張文潜本作開幔東丹王千角鹿圖遼太祖安巴堅二子長曰托雲遼史名倍次曰耀庫濟後改名德光唐明宗天成元年丙戌遼主滅渤海渤海北海之地今哈密扶餘也中國之滄州景州名渤海者蓋僑稱以張休盛改為東丹國以倍為東丹王其後舒嚕后立次子德光東丹王曰我其危哉不如適他國以成泰伯之名遂立石海上刻詩曰小山壓大山大山全無力羞見故鄉人從此投外國遂越海歸中國唐明宗長興六年也明宗賜與甚厚賜姓李名贊華以莊宗妃夏氏妻之拜懷化軍節度使東丹王有文才博今其泛海歸華載書數千卷尤好畫世傳東丹王千角鹿圖李伯時臨之董北苑有跋宣和畫譜列其目焉東丹王事頗大遼志及宣和畫譜董逌畫趿陳桱通鑑續編梓之以便覽考竹香杜子美竹詩雨洗娟娟淨風吹細細香李長吉新笋詩斫取青光寫楚詞膩香春粉黑離離又昌谷詩竹香滿淒寂粉節塗生翠竹亦有香細嗅之乃知屠蘇為草名周王褒詩飛甍雕翡翠繡桷畫屠蘇屠蘇本草名畫于屋上因草名以名屋杜詩云願隨金騕裊走置錦屠蘇此屠蘇屋名也後人又借屋名以名酒元是屠蘇酒是也又大帽形類屋亦名屠蘇南史謠云屠蘇障日覆兩耳是也虞世南織錦曲寒閨織素錦含怨斂雙蛾綜新交縷澀經脆斷絲多衣香逐舉袖釧動應鳴梭還恐裁縫罷無信往交河此虞世南織錦曲也分明是一幅織錦圖綜音縱經音徑非深知織作者不知此二句之妙王筠詠邉衣王筠詠征婦裁衣行路難其略云裲襠雙心共一抹柏腹兩邉作八撮􅀈帶雖安不忍縫開孔才穿猶未逹胸前却月兩相連本照君心不照天數句敘裁衣曲折纖微如出縫婦之口詩至此可謂細密矣甄皇后塘上行蒲生我池中緑葉何離離豈無蒹葭艾與君生别離念君去我時獨愁常苦悲相見君顔色感結傷心脾念君常苦悲夜夜不能寐莫以豪賢故棄捐素所愛莫以魚肉賤棄捐蔥與薤莫以麻枲賤棄捐管與蒯倍恩者苦枯蹶船常苦沒教君安息定慎莫致倉卒與君一别離何時復相對出亦復苦愁入亦復苦愁邊地多悲風樹朩何㮴㮴從君致獨樂延年夀千秋此詩樂府亦載而詳略不同然詞義之善無如此録之完美故書於此蹶船常苦沒黃河中行舟常有此患俗云著淺說文艐船著沙不行也尚書大傳云三艐國名亦在黃河側甄后此句正北方之語特表出之㮴音颼古本楚詞風颯颯兮朩㮴㮴今本作蕭而音亦叶颼故此詩亦作蕭蕭又作翛翛總不若㮴㮴字之古也甄后中山無極人為文帝后其後為郭貴嬪譛賜死臨終作此詩魏明帝初為王時納虞氏為妃及即位毛氏有寵而黜虞氏卞太后慰勉之虞氏曰曹氏自好立賤未有能以令終殆必由此亡國矣其後郭夫人有寵毛后愛弛亦賜死魏之兩世家法如此虞氏亡國之言良是詩可以觀不獨三百篇也元人傳竒以明帝為跳槽俗語本此栁花香李太白詩風吹栁花滿店香溫庭筠詠栁詩香隨靜婉歌塵起影伴嬌嬈舞袖垂傳竒詩莫唱踏春陽令人離腸結郎行久不歸栁自飄香雪其實栁花亦有微香詩人之言非誣也隋後主詩隋後主越王侗楊叛兒歌曰青春正陽月結伴戲京華龍媒玉珂馬鳳軫繡香車水映臨橋栁風吹夾路花日昏歡晏罷相將歸狹斜越王嗣位史稱其眉目如畫溫厚仁愛風格儼然後為王充所弒臨命禮佛曰願自今以往不復生帝王家噫亦可憐矣觀其詞藻如此若不生帝王家豈不為文人學士邪隋越王諡恭帝李淵立代王侑亦諡恭帝二主同諡蓋東西不相聞也香雲香雨雨未常有香也而李賀詩衣微香雨青氛氲元微之詩雨香雲淡覺微和雲未常有香而盧象詩云雲氣香流水詠王安石劉文靖公因書事絶句云當年一線魏瓠穿直到橫流破國年草滿金陵誰種下天津橋上聽啼鵑宋子虛詠王安石亦云投老歸耕白下田青苖猶未罷民錢半山春色多桃李無奈花飛怨杜鵑二詩皆言宋祚之亡由於安石而含蓄不露可謂詩史矣宋子虛詠史宋子虛詠史凡三百餘首其佳者如詠甘羅云函谷關中富列侯黃童亦僣上卿謀當年園綺猶年少甘隱商山到白頭詠緑珠云紅粉捐軀為主家明珠一斛委泥沙年年金谷園中燕銜取香泥葬落花詠張果云滄溟幾度見揚塵曽醉堯家丙子春近日喜無天使至蹇驢留得載閒身徐佐卿化鶴云化作遼東羽翼回適逢沙苑獵弦開寧知萬里青城客直待他年箭主來詠陸贄云詔下山東感泣來謫歸門巷鎖蒼苔奉天以後誰持筆不用當時陸九才詠宋宫人王婉容云貞烈那堪拒强求玉顔甘沒塞垣秋孤墳若是鄰青塜地下昭君見亦羞王婉容隨徽欽北去尼瑪哈見之求為子婦婉容自刎車中金人葬之道傍可謂英烈矣含笑花詩施宜生含笑花詩百步清香透玉肌滿堂皓齒轉明眉褰帷跛客相迎處射雉春風得意時九字梅花詩元天目山釋明本中峯有九字梅花詩云昨夜西風吹折千林梢渡口小艇滚入沙灘泑野樹古梅獨卧寒屋角疏影橫斜暗上書囱敲半枯半活幾箇擫蓓蕾欲開未開數㸃含香苞縱使畫工竒妙也縮手我愛清香故把新詩嘲池南唐文薦錡謂余曰此詩不佳影不可言敲又後四句有齊飯酸饀氣屬豫作一首乃口占云元冬小春十月微陽回緑萼梅蕊早傍南枝開折贈未寄陸凱隴頭去相思忽到盧同􅐼下來歌殘水調沉珠明月浦舞破山香碎玉凌風臺錯恨髙樓三弄呌雲笛無奈二十四畨花信催近觀盧贊元酴醿花詩云天將花王國艷殿春色酴醿洗粧素頰相追陪絶勝濃英綴枝不韻李堪友橫斜照水攙先梅瑶池董雙成浴香肌露竹林嵇叔夜醉玉山頽風流何事不入錦囊句清和天氣直挽青陽回亦九字律也詩亦有思致以李花為不韵甚切體物前人亦未道破者張旭詩張旭以能書名世人罕見其詩近日吳中人有收其春草帖一詩陸子淵為余誦之所謂春草青青萬里餘邉城落日見離居情知海上三年別不寄雲間一紙書也可謂絶倡余又見崔鴻臚所藏有旭書石刻三詩其一桃花磯云隱隱飛橋隔墅烟石磯西畔問漁船桃花盡日隨流水洞在清溪何處邉其二山行留客云山光物態弄春暉莫為輕隂便擬歸縱使晴明無雨色入雲深處亦霑衣其三春逰值雨云欲尋軒檻倒清樽江上烟雲向晚昏須倩東風吹散雨明朝却待入華園字畫竒怪擺雲捩風而詩亦清逸可愛好事者模為四􅗡懸之陳文惠公詩陳文惠公堯佐吳江詩云平波渺渺烟蒼蒼菰蒲才熟楊栁黃扁舟繫岸不忍去西風斜日鱸魚鄉後人於其地立鱸魚鄉亭和者百餘人皆不及也噫此詩尚敢和耶又碧瀾堂詩云苕溪清淺霅溪斜碧玉光寒一萬家誰向月明中夜聽洞庭漁笛隔蘆花二詩曲盡東南之景後之作者殆無復措手宋人絶句宋詩信不及唐然其中豈無可匹體者在選者之眼力耳如蘇舜欽吳江詩月從洞庭來光映寒湖凸四顧無纖塵魚躍明鏡裂王半山雨詩云山中十日雨雨晴門始開坐看蒼苔紋欲上人衣來孔文仲早行云客行謂已旦出視見落月瘦馬入荒陂霜花重如雪崔鶠春日云落日不可盡丹林紫谷開明明逺樹裏厯厯暝鴉回冦平仲南浦云春風入垂楊烟波漲南浦落日動離魂江花泣微雨郭公甫水車嶺云千丈水車嶺懸空九疊屏北風來不斷六月亦生氷蘇子由中秋夕云巧轉上人衣徐行度樓角河漢冷無雲冥冥獨飛鵲旅行云猿狖號枯朩魚龍泣夜潭行人已天北思婦隔江南朱文公雨詩云孤燈耿寒熖照此一窗幽卧聽簷前雨浪浪殊未休張南軒題南城云坡頭望西山秋意已如許雲影度江來霏霏半空雨東渚云團團凌風桂宛在水之東月色穿林影却下碧波中麗澤云長吟伐朩詩佇立以望子日暮飛鳥歸門前長春水西嶼云繫舟西岸邉幅巾自來去島嶼花朩深蟬鳴不知處采菱舟云散䇿下舸亭水清魚可數却上采菱舟乘風過南浦五詩有王維輞川遺意誰謂宋無詩乎子由四絶句蘇子由題李龍眠山莊圖四絶句其一瓔珞巖云泉流逢石缺脉散成寶網水神瓔珞看山是如來想其二雨花巖云巖花不可舉翔蕊久未墮忽墜幽人前知子觀空坐其三玉龍潭云白龍晝飲潭修尾掛石壁幽人欲下看雨雹晴相射其四陳彭漈云蒼壁立積鐵懸泉瀉天紳山行見已久指與未來人此四詩竒景竒句可誦可想放翁謂子由詩勝子瞻亦有見也漈閩中水名鄭樵號夾漈可證絶句四句皆對絶句四句皆對杜工部兩個黃鸝一首是也然不相聯屬即是律中四句也唐絶萬首惟韋蘇州踏閣攀林恨不同及劉長卿寂寂孤鶯啼杏園二首絶妙蓋字句雖對而意則一貫也其餘如李嶠送司馬承禎還山云蓬閣桃源兩地分人間海上不相聞一朝琴裏悲黃鶴何日山頭望白雲柳中庸征人怨云歲歲金河復玉關朝朝馬策與刀鐶三春白雪歸青塜萬里黃河繞黑山周朴邉塞曲云一隊風來一隊沙有人行處沒人家黃河九曲氷先合紫色三春不見花亦其次也蓮花詩張文潜蓮花平池碧玉秋波瑩緑雲擁扇青搖柄水宫仙子鬪紅粧輕步淩波踏明鏡杜衍雨中荷花詩翠蓋佳人臨水立檀粉不勻香汗濕一陳風來碧浪翻真珠零落難收拾此二詩絶妙又劉美中夜度娘歌菱花炯炯垂鸞結爛學宫粧勻膩雪風吹凉鬢影蕭蕭一抹疏雲對斜月冦平仲江南曲烟波渺渺一千里白蘋香散東風起惆悵汀洲日暮時柔情不斷如春水亡友何仲默嘗言宋人書不必收宋人詩不必觀余一日書此四詩訊之曰此何人詩答曰唐詩也余笑曰此乃吾子所不觀宋人之詩也仲默沉吟久之曰細看亦不佳可謂崛强矣唐彥謙詩唐彥謙絶句詩用事隱僻而諷諭悠逺似李義山如奏捷西蜀題沱江驛云野客乘軺非所宜况將儒服報戎機錦江不識臨卭酒幸免相如渴病歸即李義山相如未是真消渴猶放沱江過錦城之意也其餘如登興元城觀烽火云漢川城上角三呼護蹕防邉列萬夫褒姒塜前烽火起不知泉下破顔無鄧艾廟云昭烈遺黎死尚羞揮刀斫石恨譙周如何千載留遺廟血食巴山伴武侯此即唐人題吳中范蠡廟云千年宗國無窮恨只合江邉祀子胥之句也漢殿云鳥去雲飛意不通夜壇斜月轉桐風君王寂慮無消息却就真人覔巨公首首有醖藉堪吟詠比之貫休胡曽輩天壤矣考其世蓋僖宗時人也洪容齊唐人絶句洪容齊集録唐人絶句五十餘卷詩近萬首然余觀之猶有不盡隨即書於簡端二十餘首近又得二首其一無名氏詠姑蘇臺云無端春色上蘇臺鬱鬱芊芊草不開無風自偃君知否西子裙裾拂過來其二栁公綽題梓州牛頭寺云一出西城第二橋兩邉山朩晚蕭蕭井花淨洗行人耳留聽溪聲入夜潮詩話補遺卷一
