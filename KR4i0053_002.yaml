body:
  text: 詩話補遺卷二明楊慎撰王建宫詞王建宫詞一百首至宋南渡後失去七首好事者妄取唐人絶句補入之淚盡羅巾夢不成白樂天詩也鴛鴦瓦上忽然聲花蕊夫人詩也寶仗平明金殿開王少伯詩也日晚長秋簾外報又日映西陵松柏枝二首乃樂府銅雀臺詩也銀燭秋光冷畫屛及閒吹玉殿昭華管二首杜牧之詩也余在滇南見一古本七首特全今録於左忽地金輿向月陂內人接著便相隨却回龍武軍前過當殿教看臥鴨兒唐著作佐郎崔令欽教坊記云左右兩教坊左多善歌右多工舞外有水泊俗號月陂形如偃月也又云妓女入宜春苑謂之內人亦曰前頭人言常在駕前也其家在教坊四季給米得幸者謂之十家畫作天河刻作牛玉梭金鑷采橋頭每年宫女穿針夜敕賜新恩乞巧樓春來睡困不梳頭懶逐君王苑北逰暫向玉階花上立簸錢贏得兩三籌彈棊玉指兩參差背局臨虛鬭著危先打角頭紅子落上三金字半邊垂宛轉黃金白柄長青荷葉子畫鴛鴦把來不是呈新樣欲進微風到御床供御香方加減頻水沉山麝每回新內中不許相傳出已被醫家寫與人藥童食後進雲漿高殿無風扇小凉每到日中重掠鬢􅙳衣騎馬繞宫廊艛􅖻艛􅖻小船名音摟構見呂䝉傳白樂天詩兩片紅旗數聲鼓使君艛艓上巴東又箳篂州乘送艛艓驛船迎又還乘小艛艓却到古湓城艓當作􅖻字之誤也吳二娘吳二娘杭州名妓也有長相思一詞云深花枝淺花枝深淺花枝相間時花枝難似伊巫山高巫山低暮雨瀟瀟郎不歸空房獨守時白樂天詩吳娘暮雨瀟瀟曲自别江南久不聞又夜舞吳娘袖春歌蠻子詞自注吳二娘歌詞有暮雨瀟瀟郎不歸之句今絶妙詞選以此為白樂天詞誤矣吳二娘亦杜公之黃四娘也聊表出之謝自然升仙謝自然女仙白日飛升當時盛傳其事至長安韓昌黎作謝自然詩紀其跡甚著蓋亦得於傳聞也豫近見唐詩人劉商集有謝自然却還舊居一詩云仙侣招邀自有期九天升降五雲隨不知辭罷虛皇日更向人間住幾時觀此詩其事可知矣蓋謝氏為妖道士所惑以幻術貿遷他所而淫之久而厭之又反舊居觀商詩中所云仙侣招邀意在言外惜乎昌黎又不聞也然則世之所謂女仙者皆此類耳天窺象緯逼杜工部龍門奉先寺詩天窺象緯逼或作天閲殊為牽強章表臣詩話據舊本作天窺引史記以管窺天之語其見卓矣余又按文選潘嶽秋興賦窺天文之祕奧注引陸賈新語楚王作乾溪之臺窺天文杜子美熟精文選者也其用天窺字正本此况天文即象緯也不但用其字亦用其義矣子美復生必以余為知言也天窺窺天也雲臥卧雲也此倒字法也言窺天則星河垂地臥雲則空翠濕衣見山中之殊於人境也石􅎕御亭唐人送元中丞江淮轉運詩一首王維錢起集皆有之其云去問珠官俗來經石􅎕春東南御亭上莫問有風塵用事頗隱僻石􅎕用荀子紫􅎕魚鹽及文選石􅎕應節而楊葩事也御亭吳大帝駐輦所憩後人建御亭在晉陵庾信詩御亭一回望風塵千里昏是也今刻本或改石􅎕作右却御亭或改作衍亭轉刻轉誤漫一正之罨畫畫家稱罨畫雜彩色畫也吳興有罨畫溪然其字當用􅨢罨乃魚網非其訓也張泌詩罨岸春濤打船尾謂魚網遮岸也此用字最得字義左思蜀都賦罨翡翠釣鰋鮋王摩詰遺詩王摩詰詩今所傳僅六卷如輕隂閣小雨深院晝慵開坐看蒼苔色欲上人衣來一首見於洪覺範天厨禁臠人家在仙掌雲氣欲生衣二句見於董逌畫跋而本集不載則知其詩遺落多矣洛陽花雪何遜與范雲聨句詩云洛陽城東西却作經年别昔去雪如花今來花似雪李商隱送王校書分司詩云多少分曹掌祕文洛陽花雪夢隨君定知何遜緣聨句每到城東憶范雲又漫成一絶云不妨何范盡名家未解當年重物華逺把龍山千里雪將來擬並洛陽花二詩皆用此事若不究其源不知為何說也麗人行逸句松江陸三汀深語豫杜詩麗人行古本珠壓腰衱穩稱身下有足下何所著紅蕖羅襪穿鐙銀二句今本無之淮南蔡衡仲昻聞之擊節曰非惟樂府鼓吹兼是周昉美人畫譜也劉須溪廬陵劉辰翁㑹孟號須溪於唐人諸詩集及李杜蘇黃大家皆有批㸃又有批評三子口義及世說新語士林服其賞鑒之精博然不知其節行之高也余見元人張孟浩贈須溪詩云首陽餓夫甘一死叩馬何曽罪辛已淵明頭上漉酒巾義熙以後為全人蓋宋亡之後劉公竟不出仕也噫是與伯夷陶潛何異哉須溪私印古篆三代人物四字自許良不為過張孟浩蓋亦同時合志者他如閩中之謝臯羽徽州之胡餘學慈溪之黃東發自以中國遺人不事二姓者不知其幾宋朝待士之厚其效可驗矣元朝畨書元朝主中國日用羊皮寫詔謂之羊皮聖㫖其字用䝉古書中國人亦習之張孟浩詩云鴻濛再剖一天地書契復見科斗文張光弼輦下曲云和寧沙中撲遫筆史臣以代鉛槧事百司譯寫高昌書龍蛇復見古文字唐舞妓著靴舒元輿詠妓女從良詩云湘江舞罷却成悲便脫蠻靴出鳳幃誰是蔡雍琴酒客曹公懷舊嫁文姬可考唐世妓女舞飾也按說文鞮四夷舞人所著屨也周禮有鞮鞻氏亦是四夷之舞今之樂部舞妝皆出四夷唐人舞妓皆著靴猶有此意盧肇柘枝舞賦靴瑞錦以雲匝袍蹙金而鴈欹樂府歌錦靴玉帶舞回雲杜牧之贈妓詩曰舞靴應任傍人看笑臉還須待我開黃山谷贈妓詞云風流太守能籠翠羽宜醉金叉且留取垂楊掩映庭階直待朱輪去後便從伊窄襪弓鞋則汴宋猶似唐制至南渡後妓女窄襪弓鞋如良人矣故當時有蘇州頭杭州腳之諺云蠻靴一本作鸞靴盧肇賦一本云靴瑞錦以鸞匝袍蹙金而鴈欹以鸞對鴈當是併識於此評李杜楊誠齊云李太白之詩列子之御風也杜少陵之詩靈均之乘桂舟駕玉車也無待者神於詩者與有待而未嘗有待者聖於詩者與宋則東坡似太白山谷似少陵徐仲車云太白之詩神鷹瞥漢少陵之詩駿馬絶塵二公之評意同而語亦相近余謂太白詩仙翁劒客之語少陵詩雅士騷人之詞比之文太白則史記少陵則漢書也華不注左傳成公二年晉郤克戰於鞍齊師敗績逐之三周華不注相傳讀不字但作卜音伏琛齊記引摯虞畿服經不又音跗如詩鄂不韡韡之不謂花蒂也言此山孤秀如華跗之注於水其說甚異而有徵又按水經注云華不注山單椒秀澤孤峯刺天青崖翠發望同㸃黛九域志云大明湖望華不注山如在水中李太白詩昔我逰齊都登華不注峯兹山何峻秀綵翠如芙蓉此之芙蓉蓋因華不之名也以數說互證之伏氏音不為跗信矣杜詩步檐字杜子美詩步檐倚杖看牛斗檐古簷字楚辭大招曲屋步櫩注曲屋周閣也步櫩長砌也司馬相如賦步櫩周流長途中宿櫩亦古簷字也又梁陸倕鍾山寺詩步簷時中宿飛階或上征沈氏滿願詩步簷隨新月挑燈惜落花杜公蓋襲用其字後人不知妄改作步蟾且前聨有新月字而結句又云步蟾復矣况步蟾乃舉子坊牌字杜公時寧有此惡字耶甚矣士俗不可不醫也天風海濤趙汝愚詩江月不隨流水去天風常送海濤來朱文公愛之遂書天風海濤字於石今人不知為趙公詩也蘭廷瑞詩滇中詩人蘭廷瑞楊林人也豫過其家訪其稿僅得數十首如夏日云終日憑䦨對水鷗園林長夏似深秋槐龍細灑鵝黃雪涼意蕭蕭風滿樓冬夜云枕上詩成喜不勝起尋筆硯旋呼燈銀瓶取盡梅花水已被霜風凍作氷題嫦娥奔月圗曰竊藥私奔計已窮藁砧應恨洞房空當時射日弓猶在何事無能近月中三詩皆可喜偃曝孟浩然詩草堂時偃曝蘭枻日周旋偃曝謂偃卧曝背也用文選王僧逹寒榮共偃曝之句今刻孟詩不知其出處改作掩瀑可笑而謬者猶曰詩刻必去注釋從容咀嚼真味自長此近日強作解事小兒之通弊也蓋頥中有物乃可言咀嚼而出真味若空腸作雷鳴而強為戛齒之狀但垂飢涎耳真味何由出哉沈氏竹火籠詩陳范靜妻沈滿願詠竹火籠詩曰剖出楚山筠織成湘水紋寒銷九微火香傳百和薰氤氲擁翠被出入隨緗裙徒悲今麗質豈念昔凌雲此詩言外之意以諷士之以富貴改節者即孟子所云鄉為身死而不受今為宫室之美妻妾之奉而為之者而含蓄藴藉如此徒悲豈念四字尤見其意上薄風雅下掩唐人矣宋人稱李易安所以嵇中散至死薄殷周之句以為婦女有此大議論然太淺露比之沈氏此詩當在門墻之外矣蘇堤始末東坡先生在杭州潁州許州皆開西湖而杭湖之功尤偉其詩云我在錢唐拓湖渌大堤士女爭昌丰六橋橫絶天漢上北山始與南山通忽驚二十五萬丈老葑席卷蒼雲空此詩史也而注殊略今按宋長編云杭本江海之地水泉鹹苦唐刺史李泌始引西湖水作六井故井邑日富及白居易復浚西湖所溉千餘頃然湖多葑近嵗廢而不理湖中葑田積二十五萬餘丈而水無幾矣運河失湖水之利則取給於江潮潮渾濁多淤河行闤闠中三年一淘為市井大患而六井亦幾廢公始至浚茅山鹽橋二河以茅山一河專受江潮以鹽橋一河專受湖水復造堰閘以為湖水蓄泄之限然後潮不入市間至湖上周視良久曰今願去葑葑田如雲將安所置之湖南北三十里環湖往來終日不逹若取葑田積之湖中為長堤以通南北則葑田去而行者便矣堤成杭人名之曰蘇公堤云合是觀之則公之有功於杭人大矣豫昔在京日問之杭之士夫亦不知今閲公詩注亦略故詳注之嗚呼治水之難久矣宋之世修六塔河二股河安石以范子淵李仲昌專其事聽小人李公義宦官黃懷忠之言用鐵龍爪濬川杷天下皆笑其兒戲積以數年靡費百十萬之錢榖漂沒數十萬之丁夫迄無成功而猶不肯止其績敗功圯而姦臣李清臣為考官猶以修河問策欲掩護之甚矣宋之君臣愚且戇也視東坡杭湖潁湖之役不數月之間無靡百金而成百世之功其政事之才豈止十倍時流乎公又欲鑿石門山運河以避浮山之險當時妒者盡力排之又欲於蘇州以東鑿挽路為千橋以迅江勢亦不果用人皆恨之噫難平者事古今同一慨矣杜詩左擔之句杜子美愁坐詩曰高齊常見野愁坐更臨門十月山寒重孤城水氣昏葭萌氐種逈左擔犬羊存終日憂奔走歸期未敢論葭萌左擔皆地名也葭萌人知之左擔人罕知也注者不知或改作武擔又改作立擔皆可笑按太平御覽引李充蜀記云蜀山自綿谷葭萌道徑險窄北來擔負者不容易肩謂之左擔道又李公𦙍益州記云隂平縣有左擔道其路至險自北來者擔在左肩不得度右肩常璩南中志云自𤏡道至朱提有水步道九道有黑水及羊官水道度三津至險難行故行者謡曰楢溪赤水盤蛇七曲盤羊烏櫳氣與天通庲降賈子左擔七里又有牛叩頭馬搏坂其險如此據此三書左擔道有三綿谷一也隂平二也朱提三也義則一而已朱提今之烏撒雲貴往來之西路也趙李阮籍詩西逰咸陽市趙李相經過顔延年注趙飛燕李夫人非也按漢書乃成帝時趙季李欵延年之博尚有此誤朱滔括兵朱滔括兵不擇士族悉令赴軍自閲於毬場有士子容止可觀進趨淹雅滔召問曰所業者何曰學為詩問有妻否曰有即令作寄內詩援筆立成詞曰握筆題詩易荷戈征戍難慣從鴛被暖怯向鴈門寒瘦盡寬衣帶啼多漬枕檀試留青黛著回日畫眉看又令代妻作詩答曰蓬鬢荆叉世所稀布裙猶是嫁時衣胡麻好種無人種合是歸時底不歸滔遺以束帛放歸王霞卿進士鄭殷彛旅逰㑹稽寓唐安寺見粉壁有題云琅琊王氏霞卿光啓三年陽春二月登於是閣臨軒轉恨覩物增悲雖看煥爛之花但比淒涼之色時有輕綃捧硯小玉觀題詩曰春來引步暫尋幽愁見風光倚寺樓正好開懷對煙月雙眉不展自如鈎鄭生和曰題詩仙子此曽逰應是尋春别鳳樓賴得從來未相識免教錦帳對銀鈎霞卿乃邑宰韓嵩妾自京師挈之任所嵩遇暴冦而卒鄭生欣然謁之時霞卿竟辭以疾而不見焉但令總角婢子輕綃持詩答曰君是烟霄折桂身聖朝方切用儒珍正堪西上文場戰空向途中泥婦人鄭得詩大慙而退唐㑹昌中三鄉有女子題詩於壁曰西逐良人西入關良人身殁妾空還謝娘衛女不相待為雨為雲過此山進士陸真洞王祝劉谷王條李昌鄴王碩李傐張綺髙衢韋氷賈馳十一人和之曰三鄉略未聞謁之而不內恧而退者也胡琴婢勝兒吳泰伯祠在閶門之東每春秋市人相率牲醴多圖善馬綵輿美女以獻之時金銀行以輕綃畫侍婢捧胡琴以從其貌勝於舊繪者名其為勝兒蓋他獻者無以匹也女巫方舞有進士劉景復送客之金陵置酒于廟東通波館忽缺伸思寢夢紫衣冠者言襄王奉屈劉生隨至廟周旋揖讓而坐王語劉生曰適納一胡琴妓藝精而色麗知吾子善歌故奉邀作胡琴一曲以寵之生初頗不酣命酌人間酒一杯已醉乃作歌曰繁絃已停雜吹歇勝兒調弄邏娑撥四絃攏撚三五聲喚起邊風䭾明月大聲嘈嘈奔淈淈浪蹙波間倒溟渤小絃切切怨颸颸鬼哭神悲秋悉窣倒腕斜挑掣流電春雷直戛騰秋鶻漢妃徒得端正名秦女虛誇有仙骨我聞天寶十年前凉州未作西戎窟麻衣右袵皆漢民不省烽烟暫蓬勃太平之末安史亂犬豕崩騰恣唐突𤣥宗未到萬里橋東洛西京一時沒海內漢民皆被略飲恨吞聲空咽嗢時看漢月望漢天怨氣衝星成彗孛國門之西八九鎮髙城深壘閉閒卒河湟咫尺不能收挽粟推車徒兀兀今朝聞撥凉州曲使我心神暗超忽勝兒若向邊塞彈征人淚血應䦨干吟畢以獻王召勝兒授之王之侍兒有妒者以金如意擊勝兒劉生驚而寤歌傳於吳中李芳儀芳儀江南國主李景女也納土後住京師初嫁供奉官孫某為武疆都監妻生女皆為遼中聖宗所獲封芳儀生公主一人趙至忠虞部自北庭歸朝嘗仕遼為翰林學士修國史著北庭雜記載其事時朝補之為北都教官覽其書而悲之與顔復長道作芳儀曲云金陵宫殿春霏微江南花發鷓鴣飛風流國主家千口十五吹簫粉黛稀滿堂詩酒皆詞客奪錦揮毫在瑶席後庭一曲風景改收淚臨江悲故國令公獻籍朝未央敕書築第優降王魏俘曽不輸織室供奉一官奔武疆秦淮潮水鍾山樹塞北江南易懷土雙燕清秋夢柏梁吹落天涯猶並羽相隨未是斷腸悲黃河應有却還時寧知翻手明朝事咫尺山河不可期倉皇三鼓滹沱岸良人白馬人誰見國亡家破一身存薄命如雲信流轉芳儀加我名孚新教歌遣舞不由人採珠拾翠衣裳好深紅暗盡驚邊塵隂山射虎邊風急嘈雜琵琶酒䦨泣無言數遍天河星只有南箕近鄉邑當年十指渡江來十指不知身獨哀中原骨肉又零落黃鵠寄意何當回生男自有四方志女子那知出門事君不見李陵椎髻泣窮邊丈夫漂泊猶堪憐江州廬山真風觀李主有國日施財修之刋姓氏於石有太寧公主永嘉公主皆李景女不知芳儀者孰是也秦少遊女靖康間有女子為金兵所掠自稱秦學士女道中題詩云眼前雖有還鄉路馬上曽無放我情讀者悽然曽裘父為作秦女行云妾家家世居淮海淮海文名喧宇內自從貶死古藤州門户凋零三十載可憐生長深閨裏耳濡目染知文字亦嘗強學謝娘詩女子未嫌稱博士年長以來逢世亂黃頭鮮卑兵入漢妾身亦復墮兵間往事不堪回首看一身漂蕩逐邊塵被驅不異犬與雞奔馳萬里向沙漠天長地久無還期北風蕭蕭易水寒雪花滿地經燕山千杯濁酒愁中醉一曲琵琶淚裏彈吞聲飲恨從誰訴偶然信口題詩句眼前有路可還鄉馬上迷魂不知處詩成吟罷更茫然豈意漢地能流傳當時情緒亦可念至今聞者為悲酸憶昔中郎有女子亦陷邊庭垂一紀暮年多幸逢阿瞞厚幣贖之歸故里惜哉此女不得如終竟老死留穹廬空餘詩話傳悽惻不減胡笳十八拍蘇雲卿雲卿與張浚魏公友魏公既相雲卿隱豫章東湖鬻蔬自給公托帥漕聘之微服乃得見詰朝再至則閉關矣啓之惟書與金在不啓封曽茶山作歌云東湖湖面波渺瀰東湖岸上春土肥先生鋤雲明月曉種來蔬甲今成畦把茅蕭蕭環四壁此身不願人間識乾坤清晏那復知寸心杳眇黃塵隔故人子房今九雲交情不斷江湖濵江西使漕却騶騎故作敲門問字人黃金百鎰箋一幅多謝春風到茅屋君為使者吾邦民見君容我更樵服故人與我情重哉君且歸矣明當來明朝啓扉人不見黃金不動書不開使者持書三太息封書徑上黃扉側翩翩鶴馭雲冥冥空向湖山訪行迹向來桐江嚴子陵曽得故人雙眼青芒鞋却踏金華路太史驚誇說客星先生得書掉頭去并此湖光不回顧夢夫孀婦截鬢鬟亦有老大閨中女茶山此歌可激貪鄙張世南逰宦紀聞載宋隱逸記蘇翁本末甚詳宋得翁東湖遺事北面挹湖山築菴仰高章泉先生名曰灌園菴張千載千載字毅甫廬陵人文山友也文山貴顯屢以官辟皆不就文山自廣還至吉州城下千載來見曰丞相赴北某亦往遂以故宋官營求江西省資之北寓於文山囚所側近日以美食奉之文山知是千載義焉凡留燕三年潛造一櫝文山受刑後即藏其首仍尋訪文山妻歐陽夫人於金營中俾出火其尸千載拾骨置囊并櫝南歸付其家葬之次日其子夢父文山怒云繩巨未斷其子心動毅然啓視之則有繩束其髮當其云云夢爾且髮爾何足計又萬無繩繫理繩見衆服公英爽可畏劉須溪紀其事贊于文像後曰閒居忽忽萬古咄咄天風慘然如動生髮如何尋約亦念續芻豈其英爽猶纍形軀同時之人能不顙泚昔忌其生今妒其死吕用之唐吕用之在維揚日佐髙駢專權擅政有商人劉損妻裴氏有國色用之以隂事搆取損憤惋因成詩三首曰寶叉分股合無緣魚在深淵日在天得意紫鸞休舞鏡斷蹤青鳥罷銜箋金杯倒覆難收水玉軫傾欹懶續絃從此蘼蕪山下過只應將淚比流泉鸞辭舊伴知何止鳳得新梧想稱心紅粉尚殘香羃羃白雲將散信沈沈已休磨琢投期玉懶更經營買笑金願作山頭似人石丈夫衣上淚痕深舊嘗逰處遍尋看覩物傷情死一般買笑樓前花已謝畫眉窗下月空殘雲歸巫峽音容斷路隔星河去住難莫道詩成無淚下淚如泉湧亦須乾詩成吟咏不輟一日晚見一虬鬢老叟行步迅疾眸光射人揖損曰子哀心有何不平之事損具對之叟夜果入用之家化形於斗栱之上叱用之曰所取劉氏之妻并其寶貨速還之否則隨刃落矣用之驚懼夜遣幹事賫金并裴氏還損損夜促舟去虬鬢亦無踪跡詩話補遺卷二
