body:
  text: 詩話補遺詩文評類提要臣等謹案詩話補遺三巻明楊慎撰慎有檀弓叢訓等書已著録又嘗作升庵詩話其門人楊達之刻之此其戌雲南後所作其門人曹命編次者也慎在戌所無文籍可稽著書惟憑腹笥中如稱宋本杜甫集麗人行中有足下何所有紅渠羅襪穿鐙銀二句之類已為前人之所糾至於稱渤海北海之地今哈宻扶餘中國之滄州景州名渤海者葢僑稱以張休盛云云不知哈宻在西扶餘在東絶不相及滄景一帶地皆瀕海故又有瀛州瀛海諸名謂曰僑置殊非事實又香雲香雨並出王嘉拾遺記而引李賀元稹之詩又以盧象雲氣杳流水句誤為香字如斯之類亦引據疎舛然其賅博淵通究在明人諸家之上去瑕存瑜可采者固不少也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:26a2745a217d8a1ccd23c84ab36695ee41d959a39193ecbd29353cd8215f5c01
