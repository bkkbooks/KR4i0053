body:
  text: 詩話補遺巻三明楊慎撰集句亡友安公石嘉州人妙於集句以鱸魚正美不歸去對瘦馬獨吟真可哀又請君酌我一斗酒與爾同消萬古愁又梁間燕子聞長歎李義山句樓上花枝笑獨眠劉長卿水國蓮花府韓翃雲帆楓樹林杜工部又集杜句弔葉叔晦讀者為之泣下其詩云臨江把臂難再得便與先生成永訣文章曹植波瀾濶死為星辰亦不滅老去新詩誰與傳男兒性命絶可憐出門轉盼已陳跡妻子山中哭向天中夜起坐萬感集人生有情淚沾臆鳳凰麒麟安在哉石田茅屋荒蒼苔君不見空牆日色晚悲風為我從天來曽子固詩曽子固享祀軍山廟歌云土膏起兮流泉駛兮我徂于田偕婦子兮既耕且蓺芸且耔兮一嵗之功在勤始兮野無螽螟塘有水兮非神之力其誰使兮我苞盈兮我實成兮揮鎌㨖㨖風雨聲兮囷藏露積如坻京兮遺秉滯穗富鰥㷀兮酒食勸酬銷忿爭兮非神之助嵗莫登兮我有室家神所祐兮我有旄倪神所夀兮神之惠我惟其舊兮我之報神亦云厚兮釃酒刑牲肴核豐兮吹簫考鼔聲逄逄兮我民嵗獻無終窮兮千秋萬嵗保斯宫兮此詩王荆公稱賞以為有雅頌之意當表出昧者言子固不能詩豈其然乎鏡殿唐高宗造鏡殿武后意也四壁皆安鏡為白晝秘戯之需帝一日獨坐其中劉仁軌奏事入驚走下階曰天無二日土無二王臣見四壁有數天子不祥莫大焉帝立命剔去后聞之不恱帝崩後復建之楊廉夫詩鏡殿青春秘戯多玉肌相照影相摩六郎酣戰明空笑隊隊鴛鴦漾緑波三句詩古有三句之詩意足詞贍盤屈於二十一字之中最為難工徧檢前賢詩不過四五首而已岑之敬當壚曲云明月二八照花新當壚十五晚畱賔四眸百萬横自陳最為絶倡唐傳竒無名氏春詞云楊柳裊裊隨風急西樓美人春夢中繡簾斜捲千條入宋謝臯羽寄鄧牧心云杜䳌花開桑葉齊戴勝芋生藥草肥九鎖山人歸未歸洪武中詹天􅋯寄山中友人云桂樹蒼蒼月如霧山中故人讀書處白露濕衣不可去近日雲南提學彭綱詠刺桐花云樹頭樹底花楚楚風吹緑葉翠翩翻露中㡬枝紅鸚鵡亦風韵可愛也刺桐花雲南名為鸚哥花花形酷似之彭公此詩本四句命吏冩刻於扁遺其一句復誦之自覺竟足乃不更改余聞之晉寧侍御唐池南云瓊花揚州有蕃釐觀觀中有瓊花即陳後主所謂玉樹後庭花曲中云瓊樹朝朝新也其花後萎好竒者云瓊花無種過矣宋傅子容詩云比瑒如礬總未嘉要須博物似張華因看異代前賢帖知是唐昌玉蕋花注云唐楊汝士云唐昌觀玉蕋以少故貴王汝玉名為玉蕋王介甫名為瑒花取其色白也山谷名曰山礬以其可以供染也即今之梔子花佛經名薝音膽蔔花本草名越桃劉禹錫詩玉女來看玉樹花異香先引七香車攀枝弄雪頻囬首驚怪人間日易斜張籍詩五色雲中紫鳳車尋仙來到洞仙家飛輪囬首無蹤跡惟見斑斑滿地花王建詩一樹瓏璁玉刻成飄廊㸃地色輕輕女冠夜覔香來處惟見階前碎月明注云唐元和中唐昌觀中玉蕋花盛開有仙女來逰取數枝飄然而去余謂此說未必然葢因劉張詩有玉女雲車飛輪回首之句遂傅㑹其說又因仙女取花飄然而去遂傅㑹天下無種之說不知詩人詠物托言也滇雲處處有之村姑采揷盈路仙女一何多乎草書枯澁徐浩真書多渇筆懷素草書多枯澁在書法以為妙品戴㓜公贈懐素詩曰忽為壯麗就枯澁龍蛇盤騰獸屹立曽收懐素草書歌連拂數行勢不絶藤懸槎蹙生其節竇臮亦云殊形詭狀不易說中含枯燥尤驚絶任華云時復枯燥何褵褷忽覺隂山突兀横翠微葢深知懐素之三昧者姜白石云徐季海之渇筆譬如綺筵之素饌羙人之淡籹倪思以痴重筆跡謂之墨猪元斑彦功之字評者以為死猪膓可以喻矣司空圖論詩司空圖字表聖避亂居王官谷胡致堂評其清節高致為晚唐第一流人物信矣余嘗愛其論詩云陳杜濫觴之餘沈宋始興之後傑出於江寧宏思於李杜極矣右丞蘇州趣味澄夐若清沇之貫逹大厯十數公抑又其次元白力就而氣孱乃都市豪估耳劉公夢得楊公巨源亦各有勝㑹浪仙無可取劉徳仁時得佳致亦足滌煩又曰王右丞韋蘇州澄澹精緻格在其中豈妨於遒舉哉賈浪仙誠有警句觀其全篇意思殊餒大抵附于寒澁方可致才亦為體之不偹也其論皆是而推尊右丞蘇州尤見卓識宜其一鳴於晩唐也其文集罕傳余家有之特標其論詩一節又有韻語云知非詩詩未為竒竒研昏練爽戞魄凄肌神而不知知而難狀揮之八垠巻之萬象河渾沇清放恣縱横濤怒霆蹴掀鼇掣鯨鑱空擢壁崢氷擲㦸鼓煦呵春霞溶露滴鄰女自嬉補袖而舞色絲屢空續以麻絇䑕革丁丁焮之則穴蟻聚汲汲積而隤凸上有日星下有風雅歴試自是非吾心也其目曰詩賦首句言自知非詩乃是詩也謂未為竒乃是竒也句法亦險怪書貴舊本觀樂生愛收古書嘗言古書有一種古香可愛余謂此言末矣古書無訛字轉刻轉訛莫可考證余於滇南見故家收唐詩紀事抄本甚多近見杭州刻本則十分去其九矣刻陶淵明集遺季札贊草堂詩餘舊本書坊射利欲速售減去九十餘首兼多訛字余抄為拾遺辨誤一巻先太師收唐百家詩皆全集近蘇州刻則每本減其十之一如張籍集本十二巻今只三四巻又傍取他人之作入之王維詩取王涯絶句一巻入之詫于人曰此維之全集以圖速售今王涯絶句一巻在三舍人集之中將誰欺乎此其大闗係者若一字一句之誤尤多略舉數條如王渙李夫人歌修嫮穠華銷歇盡修嫮訛作徳所武元衡詩劉琨坐嘯風清塞清塞訛作生苑琨在邊城則清塞字為是焉得有苑乎杜牧詩長空澹澹沒孤鴻今妄改作孤鳥沒平仄亦抝矣杜詩七月六日苦炎蒸俗本蒸作熱紛紛戯蝶過開慢俗本開作閑不知子羙父名閑詩中無閑字今俗本邀歡上夜闗作上夜閑曽閃朱旗此斗殷妄改殷作閑北斗閑成何文理前人已辨之矣劉巨濟收許渾詩湘潭雲盡暮烟出今俗本烟作山亦是淺人妄改湘水多煙唐詩中流欲暮見湘煙是也煙字大勝山字李義山詩瑶池宴罷畱王母金屋籹成貯阿嬌俗本作玉桃偷得憐方朔直似小兒語耳陸龜䝉宫人斜詩草著愁煙似不春俗本作草樹如煙似不春尤謬小詞如周羙成愔愔坊曲人家坊曲妓女所居俗改曲作陌張仲宗詞東風如許惡俗改如許作妒花平仄亦失貽孫夫人詞日邊消息空沈沈日俗本改作耳東坡玉如纎手嗅梅花俗改玉如作玉奴其餘不可勝數也書所以貴舊本者可以訂訛誤備叅考不獨古香可愛而已口脂面藥杜子羙臘日詩口脂面藥隨恩澤翠管銀甖下九霄李嶠文集有謝賜口脂表云青牛帳底未輟鑪香朱鳥窗前新調鉛粉揉之以辛夷甲煎然之以桂火蘭蘇又令狐楚謝臘日賜口脂紅雪表云雪凝紅紫之香膏藴蘭麝之氣合自金鼎貯於雕奩其子令狐綯謝紫雪表云靈膏有瓊液之名仙散擬雪花之狀職當喉舌匪放魯國之三緘任在燮調請獻謝莊之六出此可考唐代臘日故事亦可補杜注之遺令狐父子兩世被賜亦榮矣弓琱天順初英廟大獵從官皆戎服弓矢以扈蹕應制賦詩有祭酒劉某詩以琱弓為弓琱太學生輕薄者帖詩于監門云獵羽楊長共友僚琱弓詩倒作弓琱祭酒如今為酒祭銜官何以逹廷朝廣東舉人王佐復上詩于劉云樂羊終是愧巴西許下惟聞哭習脂豈是先生無好句弓琱何愧古人詩本為能得司成之喜劉覽之愈怒其後王佐刻其桐鄉詩具載此首遂大傳其事石苔可踐隋王無功詩石苔應可踐叢枝幸易攀清溪歸路直乘月醉歌還閒詠此詩有疑難者曰石苔之滑踐之豈不顛余曰非也觀其詩中一幸字便得其解葢言石苔本難踐幸有叢枝可攀援耳古人用意須三思乃得之謝靈運詩苔滑誰能步葛弱豈可捫此反其意唐杜審言詩攀崖踐苔易迷路出花難又順用無功詩意也章后齋聞余此言所見畧同因成一絶云哲匠應機成羙錦東風隨處㸃春功若求巧出天然處正在時人話柄中阮籍詩昔余逰大梁登于黄華顛應龍沈冀州妖女不得眠按戰國策趙武靈西至河登黄華之上夢處女鼓琴歌詩因納吳廣女娃嬴孟姚其先七世而兆于簡子之夢及入宫而奪嫡亂國豈非妖女乎張平子應問曰女魃北而應龍翔合而觀之可見其微意葢當是時魏明帝郭后毛后妒寵相殺正類武靈王事故隠語怪說亦春秋定哀多微辭意也顔延年曰阮公身事亂朝常恐遇禍因兹詠懐雖志在譏刺而文多隠避百代之下難以情測故粗明大意畧其幽㫖也信哉多根樹佛經云西域多根樹蔽芾而婆娑東西南北中五方不相見國中有婬女求偶者衆多初有一男求女約中枝㑹復有四男子亦欲求之宿女亦以言許東西與南北各各抱被去至晩女不來東枝郎唱曰旭日光已出農夫向田去妄語既不來可捨多根樹西枝郎吟曰彼妙必然來定是不妄語如何旭日光急速現下土南枝郎歎曰旭日光已出農夫早向田我等如痴羊一夜受凍眠北枝郎賡曰我等沒巴鼻只為求他妻今遭寒與凍各各被他迷中枝郎泣曰我不憂已身一夜寒凍情但恐多根樹枝葉不復生樹神聞而笑曰汝勿憂外事但憂身事急樹枯生有時欲苦無停息張亨父詩張泰字亨父姑蘇人詩句清拔名於一時其正月十六日詩云長安元夕少燈光此夜歡娛覺更忙十里東風吹翠袖九門銀燭照紅籹虹橋御陌爭春歩雲閣誰家閟晩香醉著吟鞭急歸去老夫當避少年狂其手書稿慎於先師李文正公處見之􅏖凙三都尉居塞上一治曰勒凙索谷一治居延一治畨和澤大洛切从仌􅏖凙氷著樹如索故曰凙索也北方寒夜氷華著樹如絮春秋謂之雨木氷五行志曰樹介言氷封枝條如介胄也訛作樹稼諺曰木若稼逹官怕集韻凇凍􅏖也又液雨也曾南豐集云齊地寒甚夜霧凝於木上日出飄滿庭階尤為可愛遂作詩曰園林日出凈無風霧凇花開樹樹同記得集英深殿裏舞人齊揷玉瓏鬆又曰香銷一榻􅉊毺暖月映千門霧凇寒又以為年登之兆諺云霜凇打霧凇貧兒偹飯甕余舊有詩云怪得天雞誤曉光青腰玉女試銀籹瓊敷綴葉齊如剪瑞樹花開冷不香月白詎迷三里霧雲黄先兆萬家箱貧兒飯瓮歌聲好六出何須賀謝莊陽明先生紀夢詩慎嘗反覆晋書目王𨗳為叛臣頗為世所駭異後見崔後渠先生松窗雜録亦同余見近讀陽明王先生紀夢詩尤為卓識真見自信鄙説之有稽而非謬也陽明公紀夢詩録於后正德庚辰八月廿八夕小閣忽夢晉忠臣郭景純氏以詩示予且極言王導之奸謂世之人徒知王敦之逆而不知王導實隂主之其言甚長不能盡録覺而書其所示詩於壁復為詩以紀其畧嗟乎今距景純若干年矣非有實惡深寃欝結而未暴寜有數千載之下尚懐憤不平若是者耶秋夜卧小閣夢逰滄海濵神仙不可到金銀宫闕高嶙峋中有仙人芙蓉巾顧我宛若平生親欣然就語下煙霧自言姓名郭景純㩦手歴歴訴衷曲義憤感激難具陳切齒尤深怨王導深奸老猾長欺人當年王敦覬神器導實隂主相縁夤不然三問三不答胡忍使敦殺伯仁寄書欲拔太真舌不相為謀敢爾云敦病已篤事巳去臨哭嫁禍復賣敦事成同享帝王貴事敗仍為顧命臣㡬微隠約亦可見世史掩覆多失真袖出長篇再三讀覺來字字能書紳開牕試抽晉史閱中間事迹頗有因因思景純有道者世移事往千餘春若非精誠果有激豈得到今猶憤嗔不成之語以筮戒敦實氣沮竟殞身人生生死亦不易誰能視死如輕塵燭微先㡬炳至道多能餘事非所論取義成仁忠晉室龍逢龔勝心可倫是非顛倒古多有吁嗟景純終見伸御風騎氣逰八垠彼敦之徒草木爾糞土臭腐同沈淪我昔明易道故知未來事時人不我識遂傳躭一技一思王導徒神器良久覬諸謝豈不力伯仁見其底所以敦之儔罔頋天經與地義不然百口未負托何忍置之死我於斯時知有分日中斬柴市我死悲何足我生良有以九天一人撫膺哭晉室諸公亦可恥舉目山河徒歎非㩦手登亭空洒淚王𨗳真奸雄千載人未識偶感君子談中及重與冩真記固知倉卒不成文自今當與頻謔戯倘其為我一表揚萬世萬世萬萬世右晉忠臣郭景純自述詩葢予夢中所得因表而出之賞梅懸燈余少年與恒忱二弟賞梅世耕庄懸掛燈于梅枝上賦詩云踈梅懸高燈照此花下酌只疑梅枝然不覺燈花落王浚川見而賞之曰此竒事竒句古今未有也近閱趙徳莊眼兒媚詞云黃昏小宴到君家梅粉試春華暗香素蕋横枝踈影月淡風斜更燒紅燭枝頭掛粉蠟鬭香奢元宵近也小園先試火樹銀花則昔人亦有此興矣京師易春晚杜審言詩使出鳳凰池京師易春晚竒句也葢言繁華之地流景易邁李頎詩好在長安行樂地空令嵗月易蹉跎亦此意耳近刻本改作陽春晚非也幸唐詩品彚可証余嘗言古書重刻一畨差訛一畨一苦於人之妄改二苦於匠之刀誤書所以貴舊本以此齼字音齼字玉篇不載齒怯也音楚去聲今京師語謂怯皆曰齼不獨齒怯也曽茶山和曽宏父餉柑詩云莫向君家樊素口瓠犀微齼初舉切齒傷醋也五音類聚逺山顰黄山谷和人送梅子云相如病渇應須此莫與文君蹙逺山茶山之詩全效之方秋崖楊梅詩併與文園消午渇不禁越女蹙春山罨字義罨烏答魚檢二切罕也罔从上掩之也然此字多為借義所專唐張泌詩罨岸春濤打船尾宋喻汝礪詩冥冥罨岸風淫淫打船雨又罨畫籠色畫也吳興有罨畫溪皆借罨字罨畫字正作􅨢杜牧弄水亭詩弄水亭前溪颭艷翠綃舞綺席草芊芊紫峰嵐伍伍檻前汀鴈棲枕上巴帆去停樽遲晚月咽咽上幽渚斷霓天帔垂狂燒漢旗怒塍泉落環珮畦苖差纂組不能自免去但愧來何暮杜牧池州别孟遲先輩昔子來陵陽時常苦炎熱寺樓最褰軒坐見飛鳥沒一樽中夜酒半破前峯月烟院松飄蕭風廊竹交戛好鳥響丁丁小溪光汃汃離袖颭應勞恨粉啼還咽慵憂長者來病怯長街喝呼兒旋供衫走門空踏襪手把一枝物桂花香帶雪喜極至無言笑餘翻不恱人生直作百嵗翁亦是萬古一瞬中我欲東召龍伯翁水盡到底看海空酌君一杯酒與君狂且歌離别豈足更闗意衰老相隨可奈何二詩竒崛而用韻古舊見石刻多磨滅節而書之晚唐兩派詩晩唐之詩分為二派一派學張籍則朱慶餘陳標任蕃章孝標司空圖項斯其人也一派學賈島則李洞姚合方干喻鳬周賀九僧其人也其間雖多不越此二派學乎其中日趨於下其詩不過五言律更無古體五言律起結皆平平前聮俗語十字一串帶過後聨謂之景聮極其用工又忌用事謂之㸃鬼簿惟搜眼前景而深刻思之所謂吟成五个字撚斷數莖鬚也余嘗笑之彼之視詩道也狹矣三百篇皆民間士女所作何嘗撚鬚今不讀書而徒事苦吟撚斷肋肢骨亦何益哉晩唐惟韓栁為大家韓栁之外元白皆自成家餘如李賀孟郊祖騷宗謝李義山杜牧之學杜甫温庭筠權德輿學六朝馬戴李益不墜盛唐風格不可以晩唐目之數君子真豪傑之士哉彼學張籍賈島者真處裩中之蝨也二派見張洎集序項斯詩非余之臆說也詩用兒字古詩有用近俗字而不俗者如孫光憲採蓮詩曰菡萏香連十頃陂小姑貪戯採蓮遲晩來弄水船頭濕更脫紅裙裹鴨兒李羣玉釣魚詩曰七尺青竿一丈絲菰蒲葉裏逐風吹㡬回舉手抛芳餌驚起沙灘水鴨兒又贈琵琶妓詩有曰我見鴛鴦飛水去君還望月苦相思一雙裠帶同心結早寄黃鶯孤鴈兒盧仝新年亦有詩云新年何事最堪悲病客還聽百舌兒太嵗只逰桃李徑春風肯換嵗寒枝詩話補遺巻三
